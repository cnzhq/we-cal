name: Sync Calendars

on:
  schedule:
    - cron: '0 * * * *'  # 每小时执行
  workflow_dispatch:  # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout we-cal repo
        uses: actions/checkout@v4
        with:
          repository: cnzhq/we-cal
          path: we-cal

      - name: Deploy calendars folder to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "we-cal/calendars/*"
          target: "/var/www/html/"
          strip_components: 1

      - name: Verify deployment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Deployed calendars:"
            ls -la /var/www/html/calendars/
            echo ""
            echo "Available at:"
            for file in /var/www/html/calendars/*.ics; do
              echo "  https://cal.wetcm.org.cn/$(basename $file)"
            done